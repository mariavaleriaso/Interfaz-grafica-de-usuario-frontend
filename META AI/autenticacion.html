<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InvestAI - Auth</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    import React, { useState } from 'https://esm.sh/react@18.2.0';
    import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';

    const MailIcon = () => React.createElement('svg', {
      className: 'absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500',
      fill: 'none', stroke: 'currentColor', viewBox: '0 0 24 24'
    }, React.createElement('path', { strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z' }));

    const LockIcon = () => React.createElement('svg', {
      className: 'absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500',
      fill: 'none', stroke: 'currentColor', viewBox: '0 0 24 24'
    }, React.createElement('path', { strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z' }));

    const EyeIcon = () => React.createElement('svg', {
      className: 'w-5 h-5', fill: 'none', stroke: 'currentColor', viewBox: '0 0 24 24'
    }, React.createElement('path', { strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M15 12a3 3 0 11-6 0 3 3 0 016 0z' }),
       React.createElement('path', { strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z' }));

    const EyeOffIcon = () => React.createElement('svg', {
      className: 'w-5 h-5', fill: 'none', stroke: 'currentColor', viewBox: '0 0 24 24'
    }, React.createElement('path', { strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21' }));

    const GoogleIcon = () => React.createElement('svg', {
      className: 'w-5 h-5', viewBox: '0 0 24 24'
    }, 
      React.createElement('path', { fill: '#4285F4', d: 'M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z' }),
      React.createElement('path', { fill: '#34A853', d: 'M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z' }),
      React.createElement('path', { fill: '#FBBC05', d: 'M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z' }),
      React.createElement('path', { fill: '#EA4335', d: 'M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z' })
    );

    function AuthScreen() {
      const [isLogin, setIsLogin] = useState(true);
      const [showPassword, setShowPassword] = useState(false);
      const [formData, setFormData] = useState({
        email: '',
        password: '',
        confirmPassword: ''
      });

      const handleChange = (e) => {
        setFormData({ ...formData, [e.target.name]: e.target.value });
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        if (isLogin) {
          alert(`Login: ${formData.email}`);
        } else {
          alert(`Registro: ${formData.email}`);
        }
      };

      const handleGoogleLogin = () => {
        alert('Google login clicked');
      };

      return React.createElement('div', {
        className: 'min-h-screen w-full flex items-center justify-center bg-gradient-to-br from-[#0A0F1E] via-[#1F3864] to-[#4C1D95] px-4 font-sans'
      },
        React.createElement('div', { className: 'w-full max-w-md' },
          // Logo
          React.createElement('div', { className: 'flex flex-col items-center mb-8' },
            React.createElement('div', {
              className: 'w-16 h-16 rounded-2xl bg-gradient-to-tr from-[#1F3864] to-[#C5961A] flex items-center justify-center mb-3 shadow-lg shadow-[#C5961A]/20'
            }, React.createElement('span', { className: 'text-white text-2xl font-bold' }, 'AI')),
            React.createElement('h1', { className: 'text-white text-3xl font-semibold tracking-tight' },
              'Invest', React.createElement('span', { className: 'text-[#C5961A]' }, 'AI')
            ),
            React.createElement('p', { className: 'text-slate-400 text-sm mt-1' }, 'Tu futuro financiero, inteligente')
          ),

          // Card
          React.createElement('div', {
            className: 'bg-slate-900/60 backdrop-blur-xl rounded-3xl p-8 border border-slate-700/50 shadow-2xl'
          },
            // Toggle
            React.createElement('div', { className: 'relative flex bg-slate-800/80 rounded-xl p-1 mb-8' },
              React.createElement('button', {
                onClick: () => setIsLogin(true),
                className: `flex-1 py-2.5 text-sm font-medium rounded-lg transition-all duration-300 z-10 ${isLogin ? 'text-slate-900' : 'text-slate-400 hover:text-slate-200'}`
              }, 'Iniciar sesión'),
              React.createElement('button', {
                onClick: () => setIsLogin(false),
                className: `flex-1 py-2.5 text-sm font-medium rounded-lg transition-all duration-300 z-10 ${!isLogin ? 'text-slate-900' : 'text-slate-400 hover:text-slate-200'}`
              }, 'Registrarse'),
              React.createElement('div', {
                className: `absolute top-1 bottom-1 w-1/2 bg-[#C5961A] rounded-lg transition-transform duration-300 ease-out ${isLogin ? 'translate-x-0' : 'translate-x-full'}`
              })
            ),

            // Form
            React.createElement('form', { onSubmit: handleSubmit, className: 'space-y-5' },
              // Email
              React.createElement('div', null,
                React.createElement('label', { className: 'text-slate-300 text-sm font-medium mb-2 block' }, 'Correo electrónico'),
                React.createElement('div', { className: 'relative' },
                  React.createElement(MailIcon),
                  React.createElement('input', {
                    type: 'email', name: 'email', value: formData.email, onChange: handleChange,
                    placeholder: 'tu@email.com', required: true,
                    className: 'w-full bg-slate-800/50 border border-slate-700 rounded-xl py-3 pl-11 pr-4 text-white placeholder-slate-500 focus:outline-none focus:border-[#C5961A] focus:ring-1 focus:ring-[#C5961A] transition'
                  })
                )
              ),

              // Password
              React.createElement('div', null,
                React.createElement('label', { className: 'text-slate-300 text-sm font-medium mb-2 block' }, 'Contraseña'),
                React.createElement('div', { className: 'relative' },
                  React.createElement(LockIcon),
                  React.createElement('input', {
                    type: showPassword ? 'text' : 'password', name: 'password', value: formData.password, onChange: handleChange,
                    placeholder: '••••••••', required: true,
                    className: 'w-full bg-slate-800/50 border border-slate-700 rounded-xl py-3 pl-11 pr-11 text-white placeholder-slate-500 focus:outline-none focus:border-[#C5961A] focus:ring-1 focus:ring-[#C5961A] transition'
                  }),
                  React.createElement('button', {
                    type: 'button', onClick: () => setShowPassword(!showPassword),
                    className: 'absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300'
                  }, showPassword ? React.createElement(EyeOffIcon) : React.createElement(EyeIcon))
                )
              ),

              // Confirm password solo en registro
              !isLogin && React.createElement('div', null,
                React.createElement('label', { className: 'text-slate-300 text-sm font-medium mb-2 block' }, 'Confirmar contraseña'),
                React.createElement('div', { className: 'relative' },
                  React.createElement(LockIcon),
                  React.createElement('input', {
                    type: showPassword ? 'text' : 'password', name: 'confirmPassword', value: formData.confirmPassword, onChange: handleChange,
                    placeholder: '••••••••', required: true,
                    className: 'w-full bg-slate-800/50 border border-slate-700 rounded-xl py-3 pl-11 pr-4 text-white placeholder-slate-500 focus:outline-none focus:border-[#C5961A] focus:ring-1 focus:ring-[#C5961A] transition'
                  })
                )
              ),

              // Olvidé contraseña
              isLogin && React.createElement('div', { className: 'text-right' },
                React.createElement('button', {
                  type: 'button',
                  className: 'text-sm text-[#C5961A] hover:text-[#D4A93A] transition'
                }, '¿Olvidaste tu contraseña?')
              ),

              // Botón principal
              React.createElement('button', {
                type: 'submit',
                className: 'w-full bg-[#1F3864] hover:bg-[#284785] text-white font-semibold py-3.5 rounded-xl transition-all duration-200 shadow-lg shadow-[#1F3864]/30 hover:shadow-[#1F3864]/50 border border-[#C5961A]/20'
              }, isLogin ? 'Iniciar sesión' : 'Crear cuenta'),

              // Divider
              React.createElement('div', { className: 'flex items-center gap-4 my-6' },
                React.createElement('div', { className: 'flex-1 h-px bg-slate-700' }),
                React.createElement('span', { className: 'text-slate-500 text-sm' }, 'o'),
                React.createElement('div', { className: 'flex-1 h-px bg-slate-700' })
              ),

              // Google button
              React.createElement('button', {
                type: 'button', onClick: handleGoogleLogin,
                className: 'w-full bg-slate-800 hover:bg-slate-700 text-white font-medium py-3.5 rounded-xl transition border border-slate-700 flex items-center justify-center gap-3'
              }, React.createElement(GoogleIcon), 'Iniciar sesión con Google')
            )
          ),

          // Legal
          React.createElement('p', { className: 'text-slate-500 text-xs text-center mt-8 leading-relaxed' },
            'Al continuar, aceptas nuestros ',
            React.createElement('a', { href: '#', className: 'text-[#C5961A] hover:underline' }, 'Términos de Servicio'),
            ' y ',
            React.createElement('a', { href: '#', className: 'text-[#C5961A] hover:underline' }, 'Política de Privacidad')
          )
        )
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(AuthScreen));
  </script>
</body>
</html>
