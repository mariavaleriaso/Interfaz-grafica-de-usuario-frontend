<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>InvestAI — NLP Sentimiento</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{--primary:#1F3864;--accent:#C5961A;--bull:#26A69A;--bear:#EF5350;--neu:#9e9e9e;--border:#e1e5ea}
*{box-sizing:border-box}body{margin:0;font-family:Inter,Calibri,sans-serif;background:#f5f7fb}
header{background:var(--primary);color:#fff;padding:14px 24px;display:flex;justify-content:space-between;align-items:center}
header h1{margin:0;font-size:18px}header h1 span{color:var(--accent)}
.controls{padding:14px 24px;background:#fff;border-bottom:1px solid var(--border);display:flex;gap:14px;flex-wrap:wrap;align-items:center}
select,input{padding:8px 12px;border:1px solid var(--border);border-radius:6px}
.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px;padding:16px 24px}
.card{background:#fff;border-radius:10px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.c8{grid-column:span 8}.c4{grid-column:span 4}
@media(max-width:1000px){.c8,.c4{grid-column:span 12}}
h3{margin:0 0 12px;color:var(--primary);font-size:15px}
.news{display:flex;flex-direction:column;gap:10px;max-height:680px;overflow:auto}
.news-item{border-left:4px solid var(--neu);padding:12px;background:#f8f9fb;border-radius:6px}
.news-item.bull{border-color:var(--bull)}.news-item.bear{border-color:var(--bear)}
.news-head{display:flex;justify-content:space-between;font-size:11px;color:#6c757d;margin-bottom:6px}
.news-title{font-weight:700;color:var(--primary);font-size:14px;margin-bottom:4px}
.news-body{font-size:13px;color:#444;line-height:1.4}
.news-score{display:inline-block;padding:3px 8px;border-radius:12px;font-size:11px;font-weight:700;color:#fff;margin-top:6px}
.bull .news-score{background:var(--bull)}.bear .news-score{background:var(--bear)}.neu .news-score{background:var(--neu)}
.gauge{position:relative;width:100%;text-align:center;padding:20px}
.gauge-val{font-size:32px;font-weight:700;color:var(--primary)}
.gauge-lbl{font-size:14px;color:#6c757d;margin-top:6px}
</style></head><body>
<header><h1>Invest<span>AI</span> — Análisis NLP de Noticias</h1><div style="font-size:13px">VADER + GPT-4o</div></header>
<div class="controls">
  <label>Ticker:</label>
  <select id="fTicker"><option>Todos</option><option>AAPL</option><option>MSFT</option><option>TSLA</option><option>NVDA</option><option>BTC-USD</option></select>
  <label>Desde:</label><input type="date" id="fFrom"/>
  <label>Hasta:</label><input type="date" id="fTo"/>
  <button onclick="render()" style="padding:8px 16px;background:var(--primary);color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:600">Filtrar</button>
</div>
<div class="grid">
  <div class="card c8"><h3>Feed de Noticias Financieras</h3><div class="news" id="feed"></div></div>
  <div style="display:flex;flex-direction:column;gap:16px" class="c4">
    <div class="card">
      <h3>Sentimiento Agregado del Mercado</h3>
      <div class="gauge"><canvas id="gauge" height="180"></canvas>
        <div class="gauge-val" id="gVal">+0.32</div>
        <div class="gauge-lbl" id="gLbl">BULLISH moderado</div>
      </div>
    </div>
    <div class="card">
      <h3>Distribución del Día</h3>
      <canvas id="dist" height="200"></canvas>
    </div>
  </div>
</div>
<script>
const NEWS=[
  {t:'Apple supera expectativas en iPhone 16 con crecimiento del 12%',f:'Bloomberg',tk:'AAPL',s:0.78,b:'Las ventas trimestrales superaron a los analistas, impulsadas por servicios y wearables.'},
  {t:'NVIDIA anuncia nuevo chip H200 para IA generativa',f:'Reuters',tk:'NVDA',s:0.82,b:'El nuevo procesador duplica la capacidad de inferencia de modelos de lenguaje.'},
  {t:'Tesla recorta precios en Europa por menor demanda',f:'Financial Times',tk:'TSLA',s:-0.65,b:'Recortes del 8% en Modelo 3 y Y para responder a la presión competitiva china.'},
  {t:'Microsoft Azure crece 31% interanual con impulso IA',f:'CNBC',tk:'MSFT',s:0.71,b:'Los servicios de Copilot superaron los 10 millones de usuarios empresariales.'},
  {t:'Bitcoin rompe los 70,000 USD tras aprobación de ETF',f:'CoinDesk',tk:'BTC-USD',s:0.88,b:'Flujos institucionales récord impulsan la mayor criptomoneda a máximos históricos.'},
  {t:'Google enfrenta nueva demanda antimonopolio en la UE',f:'Wall Street Journal',tk:'GOOGL',s:-0.58,b:'La Comisión Europea investiga prácticas en publicidad digital con multas potenciales.'},
  {t:'Apple mantiene precio objetivo según Morgan Stanley',f:'Yahoo Finance',tk:'AAPL',s:0.04,b:'El banco reitera precio objetivo sin cambios pese a la volatilidad reciente.'},
  {t:'Tesla anuncia nueva gigafábrica en México',f:'Reuters',tk:'TSLA',s:0.62,b:'Inversión de 5 mil millones de dólares con producción esperada para 2026.'},
  {t:'Inflación EE.UU. sorprende a la baja en 2.8%',f:'Bloomberg',tk:'AAPL',s:0.55,b:'El dato refuerza expectativas de recortes de tasas por parte de la Fed.'},
  {t:'Ethereum sufre caída del 6% tras hackeo en DeFi',f:'CoinDesk',tk:'BTC-USD',s:-0.72,b:'Vulnerabilidad en protocolo importante genera salida masiva de capitales.'},
  {t:'NVIDIA podría enfrentar restricciones de exportación adicionales',f:'Financial Times',tk:'NVDA',s:-0.48,b:'Nuevas regulaciones afectarían ventas a clientes en mercados emergentes.'},
  {t:'Microsoft cierra acuerdo de 10 años con OpenAI',f:'CNBC',tk:'MSFT',s:0.74,b:'Extensión de la alianza estratégica garantiza acceso preferente a GPT.'},
  {t:'Apple Vision Pro alcanza 1 millón de unidades vendidas',f:'Bloomberg',tk:'AAPL',s:0.45,b:'Adopción más lenta de lo esperado pero sólida en segmento empresarial.'},
  {t:'BTC: análisis técnico señala soporte clave en 62,000',f:'Yahoo Finance',tk:'BTC-USD',s:0.02,b:'Analistas técnicos coinciden en zona de acumulación tras corrección reciente.'},
  {t:'Tesla Cybertruck supera expectativas de producción',f:'Reuters',tk:'TSLA',s:0.68,b:'Producción semanal alcanza meta anticipada tras resolver cuellos de botella.'}
];
function classify(s){if(s>=0.05)return'bull';if(s<=-0.05)return'bear';return'neu'}
function label(c){return c==='bull'?'BULLISH':c==='bear'?'BEARISH':'NEUTRAL'}
function icon(c){return c==='bull'?'📈':c==='bear'?'📉':'➖'}
function render(){
  const ft=document.getElementById('fTicker').value;
  const data=NEWS.filter(n=>ft==='Todos'||n.tk===ft);
  const feed=document.getElementById('feed');feed.innerHTML='';
  let bull=0,bear=0,neu=0,sum=0;
  data.forEach(n=>{
    const c=classify(n.s);if(c==='bull')bull++;else if(c==='bear')bear++;else neu++;sum+=n.s;
    feed.innerHTML+=`<div class="news-item ${c}">
      <div class="news-head"><span>${n.f} · ${n.tk}</span><span>hace ${Math.floor(Math.random()*8)+1}h</span></div>
      <div class="news-title">${icon(c)} ${n.t}</div>
      <div class="news-body">${n.b}</div>
      <span class="news-score">${label(c)} · ${n.s.toFixed(2)}</span>
    </div>`;
  });
  const avg=data.length?sum/data.length:0;
  document.getElementById('gVal').textContent=(avg>=0?'+':'')+avg.toFixed(2);
  document.getElementById('gLbl').textContent=avg>=0.2?'BULLISH fuerte':avg>=0.05?'BULLISH moderado':avg<=-0.2?'BEARISH fuerte':avg<=-0.05?'BEARISH moderado':'NEUTRAL';

  // Gauge tipo dona semicircular
  const g=Chart.getChart('gauge');if(g)g.destroy();
  new Chart(document.getElementById('gauge'),{type:'doughnut',
    data:{datasets:[{data:[(avg+1)*50,100-(avg+1)*50],backgroundColor:[avg>=0?'#26A69A':'#EF5350','#e9ecef'],borderWidth:0}]},
    options:{rotation:-90,circumference:180,cutout:'70%',plugins:{legend:{display:false},tooltip:{enabled:false}}}});

  const d=Chart.getChart('dist');if(d)d.destroy();
  new Chart(document.getElementById('dist'),{type:'bar',
    data:{labels:['BULLISH','NEUTRAL','BEARISH'],datasets:[{data:[bull,neu,bear],backgroundColor:['#26A69A','#9e9e9e','#EF5350']}]},
    options:{indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{beginAtZero:true}}}});
}
render();
</script></body></html>
