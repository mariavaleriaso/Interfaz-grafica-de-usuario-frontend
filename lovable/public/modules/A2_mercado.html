<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>InvestAI — Datos de Mercado</title>
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<style>
:root{--primary:#1F3864;--accent:#C5961A;--up:#26A69A;--down:#EF5350;--bg:#fff;--muted:#6c757d;--border:#e1e5ea}
*{box-sizing:border-box}body{margin:0;font-family:Inter,Calibri,sans-serif;background:#f5f7fb;color:#000}
header{background:var(--primary);color:#fff;padding:14px 24px;display:flex;justify-content:space-between;align-items:center}
header h1{margin:0;font-size:18px}header h1 span{color:var(--accent)}
.tabs{display:flex;gap:4px;background:#fff;padding:0 24px;border-bottom:1px solid var(--border)}
.tab{padding:12px 20px;cursor:pointer;border-bottom:3px solid transparent;font-weight:600;color:#555}
.tab.active{border-color:var(--accent);color:var(--primary)}
.controls{display:flex;gap:12px;padding:14px 24px;background:#fff;border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center}
.controls label{font-size:12px;color:var(--muted);font-weight:600}
.controls select{padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px}
.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px;padding:16px 24px}
.card{background:#fff;border-radius:10px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.chart-area{grid-column:span 9}.side{grid-column:span 3}
@media(max-width:1100px){.chart-area,.side{grid-column:span 12}}
.metric{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px dashed var(--border);font-size:14px}
.metric:last-child{border:none}
.metric .v{font-weight:700;color:var(--primary)}
.pos{color:var(--up)!important}.neg{color:var(--down)!important}
h3{margin:0 0 12px;color:var(--primary);font-size:15px}
.ticker-badge{display:inline-block;background:var(--accent);color:#fff;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:700;margin-bottom:8px}
</style></head><body>
<header><h1>Invest<span>AI</span> — Dashboard de Mercado</h1><div style="font-size:13px">● En vivo (simulado)</div></header>
<div class="tabs">
  <div class="tab active" data-cat="stocks" onclick="setCat('stocks')">📈 Acciones</div>
  <div class="tab" data-cat="crypto" onclick="setCat('crypto')">₿ Criptomonedas</div>
</div>
<div class="controls">
  <label>Ticker:</label><select id="ticker"></select>
  <label>Período:</label>
  <select id="period">
    <option value="30">1M</option><option value="90" selected>3M</option>
    <option value="180">6M</option><option value="365">1A</option>
    <option value="730">2A</option><option value="1825">5A</option>
  </select>
</div>
<div class="grid">
  <div class="card chart-area">
    <span class="ticker-badge" id="badge">AAPL</span>
    <div id="chart" style="width:100%;height:520px"></div>
  </div>
  <div class="card side">
    <h3>Datos en tiempo real</h3>
    <div class="metric"><span>Precio</span><span class="v" id="mPrice">—</span></div>
    <div class="metric"><span>Variación</span><span class="v" id="mChg">—</span></div>
    <div class="metric"><span>Volumen</span><span class="v" id="mVol">—</span></div>
    <div class="metric"><span>Apertura</span><span class="v" id="mOpen">—</span></div>
    <div class="metric"><span>Máximo</span><span class="v" id="mHigh">—</span></div>
    <div class="metric"><span>Mínimo</span><span class="v" id="mLow">—</span></div>
    <div class="metric" id="mcRow" style="display:none"><span>Market Cap</span><span class="v" id="mCap">—</span></div>
    <h3 style="margin-top:18px">Indicadores</h3>
    <div class="metric"><span style="color:#1F77B4">— SMA 20</span><span class="v" id="iSMA20">—</span></div>
    <div class="metric"><span style="color:#FF7F0E">— SMA 50</span><span class="v" id="iSMA50">—</span></div>
    <div class="metric"><span style="color:#9467BD">— EMA 12</span><span class="v" id="iEMA12">—</span></div>
  </div>
</div>
<script>
const STOCKS=['AAPL','MSFT','GOOGL','TSLA','NVDA'];
const CRYPTO=['BTC-USD','ETH-USD'];
const BASE={AAPL:180,MSFT:415,GOOGL:165,TSLA:240,NVDA:870,'BTC-USD':65000,'ETH-USD':3400};
let category='stocks';

function setCat(c){
  category=c;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.cat===c));
  const sel=document.getElementById('ticker');sel.innerHTML='';
  (c==='stocks'?STOCKS:CRYPTO).forEach(t=>{const o=document.createElement('option');o.value=o.text=t;sel.appendChild(o)});
  document.getElementById('mcRow').style.display=c==='crypto'?'flex':'none';
  render();
}
// Genera OHLCV simulado realista (random walk)
function genData(ticker,days){
  const base=BASE[ticker]||100;
  const out=[];let price=base;const now=new Date();
  for(let i=days;i>=0;i--){
    const d=new Date(now);d.setDate(now.getDate()-i);
    const vol=base*0.018;
    const open=price;
    const close=open+(Math.random()-0.48)*vol;
    const high=Math.max(open,close)+Math.random()*vol*0.6;
    const low=Math.min(open,close)-Math.random()*vol*0.6;
    const v=Math.round(20e6+Math.random()*40e6);
    out.push({date:d,open,high,low,close,vol:v});
    price=close;
  }
  return out;
}
function sma(arr,n){return arr.map((_,i)=>i<n-1?null:arr.slice(i-n+1,i+1).reduce((a,b)=>a+b,0)/n)}
function ema(arr,n){const k=2/(n+1);const out=[arr[0]];for(let i=1;i<arr.length;i++)out.push(arr[i]*k+out[i-1]*(1-k));return out}
function fmt(n){return n>=1e9?(n/1e9).toFixed(2)+'B':n>=1e6?(n/1e6).toFixed(2)+'M':n.toLocaleString('es',{maximumFractionDigits:2})}

function render(){
  const t=document.getElementById('ticker').value;
  const days=parseInt(document.getElementById('period').value);
  const data=genData(t,days);
  const dates=data.map(d=>d.date);
  const closes=data.map(d=>d.close);
  const s20=sma(closes,20),s50=sma(closes,50),e12=ema(closes,12);
  const colors=data.map((d,i)=>i>0&&d.close>=data[i-1].close?'#26A69A':'#EF5350');

  const candle={x:dates,open:data.map(d=>d.open),high:data.map(d=>d.high),low:data.map(d=>d.low),close:data.map(d=>d.close),
    type:'candlestick',name:t,increasing:{line:{color:'#26A69A'}},decreasing:{line:{color:'#EF5350'}},xaxis:'x',yaxis:'y'};
  const sma20={x:dates,y:s20,type:'scatter',mode:'lines',name:'SMA 20',line:{color:'#1F77B4',width:1.5},xaxis:'x',yaxis:'y'};
  const sma50={x:dates,y:s50,type:'scatter',mode:'lines',name:'SMA 50',line:{color:'#FF7F0E',width:1.5},xaxis:'x',yaxis:'y'};
  const ema12={x:dates,y:e12,type:'scatter',mode:'lines',name:'EMA 12',line:{color:'#9467BD',width:1.5,dash:'dot'},xaxis:'x',yaxis:'y'};
  const volBar={x:dates,y:data.map(d=>d.vol),type:'bar',name:'Volumen',marker:{color:colors},xaxis:'x',yaxis:'y2',opacity:.7};

  Plotly.newPlot('chart',[candle,sma20,sma50,ema12,volBar],{
    template:'plotly_white',margin:{t:20,r:30,b:40,l:60},
    xaxis:{rangeslider:{visible:true,thickness:.06},type:'date'},
    yaxis:{domain:[.28,1],title:'Precio (USD)'},
    yaxis2:{domain:[0,.22],title:'Volumen'},
    legend:{orientation:'h',y:1.08},showlegend:true
  },{responsive:true,displayModeBar:true});

  // Panel lateral
  const last=data[data.length-1],prev=data[data.length-2]||last;
  const chg=((last.close-prev.close)/prev.close*100);
  document.getElementById('badge').textContent=t;
  document.getElementById('mPrice').textContent='$'+last.close.toFixed(2);
  const chgEl=document.getElementById('mChg');
  chgEl.textContent=(chg>=0?'+':'')+chg.toFixed(2)+'%';
  chgEl.className='v '+(chg>=0?'pos':'neg');
  document.getElementById('mVol').textContent=fmt(last.vol);
  document.getElementById('mOpen').textContent='$'+last.open.toFixed(2);
  document.getElementById('mHigh').textContent='$'+last.high.toFixed(2);
  document.getElementById('mLow').textContent='$'+last.low.toFixed(2);
  document.getElementById('mCap').textContent='$'+fmt(last.close*19e6);
  document.getElementById('iSMA20').textContent='$'+(s20[s20.length-1]||0).toFixed(2);
  document.getElementById('iSMA50').textContent='$'+(s50[s50.length-1]||0).toFixed(2);
  document.getElementById('iEMA12').textContent='$'+e12[e12.length-1].toFixed(2);
}
document.getElementById('ticker').addEventListener('change',render);
document.getElementById('period').addEventListener('change',render);
setCat('stocks');
</script></body></html>
