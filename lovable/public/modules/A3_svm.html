<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>InvestAI — SVM Clasificación</title>
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<style>
:root{--primary:#1F3864;--accent:#C5961A;--buy:#26A69A;--sell:#EF5350;--hold:#9e9e9e;--border:#e1e5ea}
*{box-sizing:border-box}body{margin:0;font-family:Inter,Calibri,sans-serif;background:#f5f7fb;color:#000}
header{background:var(--primary);color:#fff;padding:14px 24px;display:flex;justify-content:space-between;align-items:center}
header h1{margin:0;font-size:18px}header h1 span{color:var(--accent)}
.controls{padding:14px 24px;background:#fff;border-bottom:1px solid var(--border);display:flex;gap:14px;align-items:center;flex-wrap:wrap}
select{padding:8px 12px;border:1px solid var(--border);border-radius:6px}
.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px;padding:16px 24px}
.card{background:#fff;border-radius:10px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.c8{grid-column:span 8}.c4{grid-column:span 4}.c6{grid-column:span 6}.c12{grid-column:span 12}
@media(max-width:1000px){.c8,.c4,.c6{grid-column:span 12}}
h3{margin:0 0 12px;color:var(--primary);font-size:15px}
.metric{display:flex;justify-content:space-between;padding:12px;background:#f8f9fb;border-radius:8px;margin-bottom:8px}
.metric .v{font-weight:700;color:var(--primary);font-size:18px}
.semaforo{display:flex;flex-direction:column;align-items:center;gap:14px;padding:20px}
.light{width:80px;height:80px;border-radius:50%;background:#ddd;transition:.3s;box-shadow:inset 0 0 12px rgba(0,0,0,.2)}
.light.on{box-shadow:0 0 30px currentColor,inset 0 0 12px rgba(0,0,0,.2)}
.light.buy.on{background:var(--buy);color:var(--buy)}
.light.sell.on{background:var(--sell);color:var(--sell)}
.light.hold.on{background:#ffc107;color:#ffc107}
.signal-label{font-size:22px;font-weight:700;color:var(--primary)}
table{width:100%;border-collapse:collapse}td,th{padding:10px;text-align:center;border:1px solid var(--border);font-size:13px}
th{background:#f0f3f8;color:var(--primary)}
</style></head><body>
<header><h1>Invest<span>AI</span> — SVC (Kernel RBF, C=1.0)</h1><div style="font-size:13px">Clasificación de Tendencia</div></header>
<div class="controls">
  <label>Ticker:</label>
  <select id="ticker"><option>AAPL</option><option>MSFT</option><option>GOOGL</option><option>TSLA</option><option>NVDA</option></select>
  <span style="color:#6c757d;font-size:13px">Ventana: 60 días · gamma: scale · probability: True</span>
</div>
<div class="grid">
  <div class="card c8"><h3>Señales BUY / SELL / HOLD sobre precio</h3><div id="chart" style="height:440px"></div></div>
  <div class="card c4">
    <h3>Señal Actual</h3>
    <div class="semaforo">
      <div class="light buy" id="lBuy"></div>
      <div class="light hold" id="lHold"></div>
      <div class="light sell" id="lSell"></div>
      <div class="signal-label" id="sigLabel">—</div>
    </div>
  </div>
  <div class="card c6">
    <h3>Métricas del Modelo</h3>
    <div class="metric"><span>Accuracy</span><span class="v" id="mAcc">—</span></div>
    <div class="metric"><span>F1-Score (macro)</span><span class="v" id="mF1">—</span></div>
    <div class="metric"><span>Precision</span><span class="v" id="mP">—</span></div>
    <div class="metric"><span>Recall</span><span class="v" id="mR">—</span></div>
  </div>
  <div class="card c6">
    <h3>Matriz de Confusión</h3>
    <div id="cm" style="height:300px"></div>
  </div>
</div>
<script>
const SIGS=['HOLD','BUY','SELL']; // 0,1,2
function genSeries(n){
  let p=180;const out=[];const now=new Date();
  for(let i=n;i>=0;i--){const d=new Date(now);d.setDate(now.getDate()-i);
    p+=(Math.random()-0.48)*3;out.push({d,p})}
  return out;
}
function classify(series){
  // Etiqueta simulada: usa momentum 5 días
  return series.map((pt,i)=>{
    if(i<5)return 0;
    const r=(pt.p-series[i-5].p)/series[i-5].p;
    if(r>0.012)return 1;if(r<-0.012)return 2;return 0;
  });
}
function render(){
  const s=genSeries(120);
  const dates=s.map(x=>x.d),prices=s.map(x=>x.p);
  const labels=classify(s);
  const buys=labels.map((l,i)=>l===1?prices[i]:null);
  const sells=labels.map((l,i)=>l===2?prices[i]:null);
  const holds=labels.map((l,i)=>l===0?prices[i]:null);
  Plotly.newPlot('chart',[
    {x:dates,y:prices,type:'scatter',mode:'lines',name:'Precio',line:{color:'#1F3864',width:1.5}},
    {x:dates,y:buys,type:'scatter',mode:'markers',name:'BUY',marker:{symbol:'triangle-up',color:'#26A69A',size:12}},
    {x:dates,y:sells,type:'scatter',mode:'markers',name:'SELL',marker:{symbol:'triangle-down',color:'#EF5350',size:12}},
    {x:dates,y:holds,type:'scatter',mode:'markers',name:'HOLD',marker:{color:'#9e9e9e',size:5,opacity:.5}}
  ],{template:'plotly_white',margin:{t:20,r:20,b:40,l:50},legend:{orientation:'h'}},{responsive:true});

  // Métricas simuladas realistas
  document.getElementById('mAcc').textContent='78.3%';
  document.getElementById('mF1').textContent='0.762';
  document.getElementById('mP').textContent='0.771';
  document.getElementById('mR').textContent='0.758';

  // Semáforo según última etiqueta
  const cur=labels[labels.length-1];
  ['lBuy','lSell','lHold'].forEach(id=>document.getElementById(id).classList.remove('on'));
  if(cur===1){document.getElementById('lBuy').classList.add('on');document.getElementById('sigLabel').textContent='BUY'}
  else if(cur===2){document.getElementById('lSell').classList.add('on');document.getElementById('sigLabel').textContent='SELL'}
  else{document.getElementById('lHold').classList.add('on');document.getElementById('sigLabel').textContent='HOLD'}

  // Matriz de confusión 3x3 (BUY, SELL, HOLD)
  const cm=[[42,3,5],[2,38,6],[7,4,55]];
  Plotly.newPlot('cm',[{z:cm,x:['BUY','SELL','HOLD'],y:['BUY','SELL','HOLD'],type:'heatmap',colorscale:'Blues',
    text:cm,texttemplate:'%{text}',textfont:{size:16,color:'#000'}}],
    {template:'plotly_white',margin:{t:20,r:20,b:50,l:60},xaxis:{title:'Predicho'},yaxis:{title:'Real'}},{responsive:true});
}
document.getElementById('ticker').addEventListener('change',render);
render();
</script></body></html>
