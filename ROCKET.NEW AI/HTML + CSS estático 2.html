<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sistema de Predicción Bursátil</title>
    <style>
        /* --- RESET Y VARIABLES --- */
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --accent-color: #1a1a1a;
            --bullish-color: #26A69A;
            --bearish-color: #EF5350;
            --sma20-color: #2196F3;
            --sma50-color: #FF9800;
            --ema12-color: #E91E63;
            --border-color: #e0e0e0;
            --shadow: 0 2px 10px rgba(0,0,0,0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* --- LAYOUT PRINCIPAL --- */
        .container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        @media (min-width: 992px) {
            .container {
                grid-template-columns: 1fr 300px;
            }
        }

        header {
            grid-column: 1 / -1;
            padding: 10px 0;
            border-bottom: 2px solid var(--accent-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-weight: bold;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- PESTAÑAS (CSS PURE) --- */
        .tabs-container {
            width: 100%;
            margin-bottom: 20px;
        }

        .tabs-inputs {
            display: none;
        }

        .tabs-labels {
            display: flex;
            border-bottom: 1px solid var(--border-color);
        }

        .tab-label {
            padding: 10px 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
        }

        #tab1:checked ~ .tabs-labels label[for="tab1"],
        #tab2:checked ~ .tabs-labels label[for="tab2"] {
            color: var(--accent-color);
            border-bottom-color: var(--accent-color);
        }

        /* --- SELECTORES --- */
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        select {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: white;
            cursor: pointer;
            font-size: 0.9rem;
        }

        /* --- GRÁFICO DE VELAS (MOCKUP) --- */
        .chart-wrapper {
            background: #fcfcfc;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .chart-container {
            height: 400px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            padding-bottom: 30px;
            border-left: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            position: relative;
        }

        /* Rejilla del gráfico */
        .chart-grid {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
        }

        .grid-line {
            width: 100%;
            height: 1px;
            background: rgba(0,0,0,0.05);
        }

        /* Velas */
        .candle {
            flex: 1;
            margin: 0 2px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            min-width: 8px;
        }

        .wick {
            width: 1px;
            background: currentColor;
            position: absolute;
        }

        .body {
            width: 100%;
            background: currentColor;
            border-radius: 1px;
            position: relative;
        }

        .bullish { color: var(--bullish-color); }
        .bearish { color: var(--bearish-color); }

        /* --- LEYENDA --- */
        .legend {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            font-size: 0.85rem;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .line-indicator {
            width: 20px;
            height: 3px;
            border-radius: 2px;
        }

        .sma20 { background: var(--sma20-color); }
        .sma50 { background: var(--sma50-color); }
        .ema12 { background: var(--ema12-color); }

        /* --- PANEL LATERAL (KPIs) --- */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .kpi-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            transition: transform 0.2s;
        }

        .kpi-card:hover {
            transform: translateY(-2px);
        }

        .kpi-label {
            font-size: 0.8rem;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 5px;
            display: block;
        }

        .kpi-value {
            font-size: 1.4rem;
            font-weight: bold;
            display: block;
        }

        .kpi-change {
            font-size: 0.9rem;
            font-weight: 600;
        }

        .positive { color: var(--bullish-color); }
        .negative { color: var(--bearish-color); }

        /* Simulación de líneas de indicadores sobre el gráfico */
        .indicator-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .path-sim {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0.6;
        }
        
        /* Ocultar contenido de pestañas no seleccionadas */
        .tab-content {
            display: none;
            padding-top: 20px;
        }

        #tab1:checked ~ .content-container #content1,
        #tab2:checked ~ .content-container #content2 {
            display: block;
        }

    </style>
</head>
