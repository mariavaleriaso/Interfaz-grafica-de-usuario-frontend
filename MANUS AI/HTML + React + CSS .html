<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Inversión IA - Visualización de Mercado</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Plotly.js CDN -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <!-- React y ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel para JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            background-color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .bg-navy { background-color: #1F3864; }
        .text-navy { color: #1F3864; }
        .bg-gold { background-color: #C5961A; }
        .text-gold { color: #C5961A; }
        .border-gold { border-color: #C5961A; }
        #chart-container { height: 600px; width: 100%; }
    </style>
</head>
<body>
    <div id="root">
        <div class="flex items-center justify-center h-screen">
            <div class="text-2xl font-bold text-navy animate-pulse">Cargando Dashboard Financiero...</div>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- SIMULACIÓN DE DATOS ---
        const generateData = (ticker, days) => {
            const data = [];
            let price = ticker.includes('BTC') || ticker.includes('ETH') ? 45000 : 180;
            const volatility = ticker.includes('BTC') || ticker.includes('ETH') ? 0.04 : 0.015;
            const now = new Date();
            
            for (let i = days; i >= 0; i--) {
                const date = new Date(now);
                date.setDate(date.getDate() - i);
                const open = price * (1 + (Math.random() - 0.5) * volatility);
                const high = open * (1 + Math.random() * volatility);
                const low = open * (1 - Math.random() * volatility);
                const close = low + Math.random() * (high - low);
                const volume = Math.floor(Math.random() * 1000000) + 500000;
                
                data.push({
                    date: date.toISOString().split('T')[0],
                    open, high, low, close, volume
                });
                price = close;
            }
            return data;
        };

        const calculateSMA = (data, period) => {
            return data.map((_, i) => {
                if (i < period - 1) return null;
                const slice = data.slice(i - period + 1, i + 1);
                return slice.reduce((acc, val) => acc + val.close, 0) / period;
            });
        };

        const calculateEMA = (data, period) => {
            const k = 2 / (period + 1);
            let ema = data[0].close;
            return data.map((val, i) => {
                if (i === 0) return ema;
                ema = (val.close * k) + (ema * (1 - k));
                return ema;
            });
        };

        // --- COMPONENTES ---
        const Sidebar = ({ ticker, data }) => {
            if (!data || data.length < 2) return null;
            const last = data[data.length - 1];
            const prev = data[data.length - 2];
            const change = last.close - prev.close;
            const pct = (change / prev.close) * 100;
            const isUp = change >= 0;

            return (
                <div className="bg-white p-6 rounded-xl shadow-lg border-t-4 border-gold">
                    <h3 className="text-navy font-bold text-lg mb-4 border-b pb-2">Resumen de Mercado</h3>
                    <div className="space-y-4">
                        <div>
                            <p className="text-xs text-gray-400 font-bold uppercase">Ticker Seleccionado</p>
                            <p className="text-2xl font-black text-navy">{ticker}</p>
                        </div>
                        <div>
                            <p className="text-xs text-gray-400 font-bold uppercase">Precio de Cierre</p>
                            <p className={`text-3xl font-black ${isUp ? 'text-green-600' : 'text-red-600'}`}>
                                ${last.close.toLocaleString(undefined, {minimumFractionDigits: 2})}
                            </p>
                        </div>
                        <div>
                            <p className="text-xs text-gray-400 font-bold uppercase">Variación</p>
                            <p className={`text-lg font-bold ${isUp ? 'text-green-600' : 'text-red-600'}`}>
                                {isUp ? '▲' : '▼'} {Math.abs(pct).toFixed(2)}%
                            </p>
                        </div>
                        <div>
                            <p className="text-xs text-gray-400 font-bold uppercase">Volumen 24h</p>
                            <p className="text-lg font-bold text-gray-700">{last.volume.toLocaleString()}</p>
                        </div>
                        {ticker.includes('-') && (
                            <div>
                                <p className="text-xs text-gray-400 font-bold uppercase">Cap. de Mercado (Est.)</p>
                                <p className="text-lg font-bold text-gray-700">${(last.close * 19.5e6 / 1e9).toFixed(2)}B</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [tab, setTab] = useState('Acciones');
            const [ticker, setTicker] = useState('AAPL');
            const [period, setPeriod] = useState('3M');
            const [data, setData] = useState([]);

            const config = {
                'Acciones': ['AAPL', 'MSFT', 'GOOGL', 'TSLA', 'NVDA'],
                'Criptomonedas': ['BTC-USD', 'ETH-USD']
            };

            const periods = { '1M': 30, '3M': 90, '6M': 180, '1A': 365, '2A': 730, '5A': 1825 };

            useEffect(() => {
                setData(generateData(ticker, periods[period]));
            }, [ticker, period]);

            useEffect(() => {
                setTicker(config[tab][0]);
            }, [tab]);

            useEffect(() => {
                if (data.length === 0) return;

                const dates = data.map(d => d.date);
                const sma20 = calculateSMA(data, 20);
                const sma50 = calculateSMA(data, 50);
                const ema12 = calculateEMA(data, 12);

                const traces = [
                    {
                        x: dates, open: data.map(d => d.open), high: data.map(d => d.high),
                        low: data.map(d => d.low), close: data.map(d => d.close),
                        type: 'candlestick', name: ticker,
                        increasing: {line: {color: '#26A69A'}},
                        decreasing: {line: {color: '#EF5350'}},
                        xaxis: 'x', yaxis: 'y'
                    },
                    { x: dates, y: sma20, type: 'scatter', mode: 'lines', name: 'SMA 20', line: {color: '#1F3864', width: 1.5} },
                    { x: dates, y: sma50, type: 'scatter', mode: 'lines', name: 'SMA 50', line: {color: '#C5961A', width: 1.5} },
                    { x: dates, y: ema12, type: 'scatter', mode: 'lines', name: 'EMA 12', line: {color: '#9c27b0', width: 1, dash: 'dot'} },
                    {
                        x: dates, y: data.map(d => d.volume), type: 'bar', name: 'Volumen',
                        marker: { color: data.map(d => d.close >= d.open ? '#26A69A' : '#EF5350') },
                        xaxis: 'x', yaxis: 'y2'
                    }
                ];

                const layout = {
                    dragmode: 'zoom', showlegend: true,
                    legend: { orientation: 'h', y: 1.1 },
                    margin: { r: 10, t: 30, b: 40, l: 50 },
                    xaxis: { autorange: true, type: 'date', rangeslider: { visible: true, thickness: 0.05 } },
                    yaxis: { autorange: true, domain: [0.3, 1], title: 'Precio ($)' },
                    yaxis2: { autorange: true, domain: [0, 0.2], title: 'Volumen' },
                    plot_bgcolor: '#ffffff', paper_bgcolor: '#ffffff'
                };

                Plotly.newPlot('chart-container', traces, layout, {responsive: true, displaylogo: false});
            }, [data, ticker]);

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-7xl mx-auto">
                        {/* Header */}
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                            <div>
                                <h1 className="text-4xl font-black text-navy tracking-tighter">
                                    INVEST<span className="text-gold">AI</span> DASHBOARD
                                </h1>
                                <p className="text-gray-500 font-medium">Soporte de Decisiones Financieras de Alto Nivel</p>
                            </div>
                            <div className="bg-white px-4 py-2 rounded-full shadow-sm border border-gray-100 flex items-center gap-2">
                                <div className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                                <span className="text-xs font-bold text-gray-600 uppercase">Live Market Data Simulation</span>
                            </div>
                        </div>

                        {/* Tabs */}
                        <div className="flex gap-2 mb-6 bg-gray-200 p-1 rounded-xl w-fit">
                            {Object.keys(config).map(t => (
                                <button 
                                    key={t}
                                    onClick={() => setTab(t)}
                                    className={`px-6 py-2 rounded-lg font-bold transition-all ${tab === t ? 'bg-white text-navy shadow-sm' : 'text-gray-500 hover:text-navy'}`}
                                >
                                    {t.toUpperCase()}
                                </button>
                            ))}
                        </div>

                        <div className="grid grid-cols-12 gap-6">
                            {/* Main Panel */}
                            <div className="col-span-12 lg:col-span-9 space-y-6">
                                <div className="bg-white p-4 rounded-xl shadow-lg flex flex-wrap gap-6 items-center">
                                    <div className="flex flex-col">
                                        <label className="text-[10px] font-black text-gray-400 mb-1 uppercase">Seleccionar Ticker</label>
                                        <select 
                                            value={ticker} 
                                            onChange={e => setTicker(e.target.value)}
                                            className="bg-gray-50 border border-gray-200 rounded-lg px-4 py-2 font-bold text-navy outline-none focus:ring-2 focus:ring-navy transition-all"
                                        >
                                            {config[tab].map(t => <option key={t} value={t}>{t}</option>)}
                                        </select>
                                    </div>
                                    <div className="flex flex-col">
                                        <label className="text-[10px] font-black text-gray-400 mb-1 uppercase">Periodo Temporal</label>
                                        <div className="flex gap-1 bg-gray-100 p-1 rounded-lg">
                                            {Object.keys(periods).map(p => (
                                                <button 
                                                    key={p}
                                                    onClick={() => setPeriod(p)}
                                                    className={`px-3 py-1 rounded-md text-xs font-bold transition-all ${period === p ? 'bg-navy text-white' : 'text-gray-500 hover:bg-gray-200'}`}
                                                >
                                                    {p}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white p-4 rounded-xl shadow-lg">
                                    <div id="chart-container"></div>
                                </div>
                            </div>

                            {/* Sidebar */}
                            <div className="col-span-12 lg:col-span-3">
                                <Sidebar ticker={ticker} data={data} />
                                <div className="mt-6 p-4 bg-navy rounded-xl text-white shadow-lg">
                                    <h4 className="font-bold mb-2 flex items-center gap-2">
                                        <span className="text-gold">★</span> IA Insights
                                    </h4>
                                    <p className="text-xs text-blue-100 leading-relaxed">
                                        El análisis actual sugiere una tendencia {data[data.length-1]?.close > data[data.length-2]?.close ? 'alcista' : 'bajista'} basada en el cruce de medias móviles SMA20/50. Se recomienda monitorear niveles de soporte.
                                    </p>
                                </div>
                            </div>
                        </div>
                        
                        <footer className="mt-12 text-center text-gray-400 text-xs font-medium pb-8">
                            © 2026 INVEST-AI SYSTEMS | DESARROLLADO PARA ANALISTAS FINANCIEROS SENIOR
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
