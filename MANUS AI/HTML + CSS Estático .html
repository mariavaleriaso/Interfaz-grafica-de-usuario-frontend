<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Visualización de Datos de Mercado</title>
    <style>
        /* ============================================
           MOCKUP ESTÁTICO DE REFERENCIA VISUAL
           Dashboard de Visualización de Datos de Mercado
           Sistema Web de Apoyo en Decisiones de Inversión
           ============================================ */

        /* Variables CSS para la paleta de colores */
        :root {
            --color-fondo: #FFFFFF;
            --color-texto: #000000;
            --color-alcista: #26A69A;
            --color-bajista: #EF5350;
            --color-titulo: #1F3864;
            --color-acento: #C5961A;
            --color-borde: #E0E0E0;
            --color-fondo-panel: #F8F8F8;
        }

        /* Estilos globales */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, sans-serif;
            background-color: var(--color-fondo);
            color: var(--color-texto);
            line-height: 1.6;
        }

        /* Contenedor principal del dashboard */
        .dashboard-container {
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: auto auto auto 1fr auto;
            min-height: 100vh;
            gap: 0;
        }

        /* Encabezado del dashboard */
        .dashboard-header {
            background-color: var(--color-fondo);
            border-bottom: 2px solid var(--color-borde);
            padding: 20px 30px;
            grid-column: 1;
        }

        .dashboard-header h1 {
            color: var(--color-titulo);
            font-size: 28px;
            font-weight: 600;
        }

        /* Contenedor de pestañas */
        .tabs-container {
            display: flex;
            border-bottom: 1px solid var(--color-borde);
            background-color: var(--color-fondo);
            padding: 0 30px;
            gap: 0;
        }

        .tab {
            padding: 15px 25px;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            transition: all 0.3s ease;
        }

        .tab.active {
            color: var(--color-titulo);
            border-bottom-color: var(--color-acento);
            font-weight: 600;
        }

        /* Panel de controles */
        .controls-panel {
            display: flex;
            gap: 15px;
            padding: 20px 30px;
            background-color: var(--color-fondo-panel);
            border-bottom: 1px solid var(--color-borde);
            flex-wrap: wrap;
        }

        .ticker-selector,
        .period-selector {
            padding: 10px 15px;
            border: 1px solid var(--color-borde);
            border-radius: 4px;
            font-family: system-ui, sans-serif;
            font-size: 14px;
            background-color: var(--color-fondo);
            color: var(--color-texto);
            cursor: pointer;
            min-width: 120px;
        }

        .ticker-selector:hover,
        .period-selector:hover {
            border-color: var(--color-acento);
        }

        /* Contenido principal */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
            padding: 20px 30px;
            background-color: var(--color-fondo);
            grid-column: 1;
        }

        /* Panel del gráfico */
        .chart-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-color: var(--color-fondo-panel);
            border: 1px solid var(--color-borde);
            border-radius: 4px;
            padding: 20px;
            position: relative;
        }

        /* Gráfico de velas japonesas */
        .candlestick-chart {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            height: 350px;
            gap: 4px;
            padding: 20px 10px;
            background: linear-gradient(180deg, #FAFAFA 0%, #FFFFFF 100%);
            border: 1px solid var(--color-borde);
            border-radius: 4px;
            position: relative;
        }

        .candle-wrapper {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            width: 100%;
            height: 100%;
            gap: 3px;
            padding: 10px;
        }

        /* Estilos para cada vela */
        .candle {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            min-height: 20px;
        }

        /* Velas alcistas (verdes) */
        .candle.bullish {
            background: linear-gradient(to bottom, var(--color-alcista) 0%, var(--color-alcista) 70%, rgba(38, 166, 154, 0.3) 100%);
            border: 1px solid var(--color-alcista);
            border-radius: 2px 2px 0 0;
        }

        .candle.bullish::before {
            content: '';
            position: absolute;
            width: 1px;
            height: calc(var(--high) - var(--low));
            background-color: var(--color-alcista);
            top: calc(-1 * (var(--high) - var(--close)) * 2px);
            left: 50%;
            transform: translateX(-50%);
        }

        .candle.bullish::after {
            content: '';
            position: absolute;
            width: 1px;
            height: calc(var(--low) * 1px);
            background-color: var(--color-alcista);
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* Velas bajistas (rojas) */
        .candle.bearish {
            background: linear-gradient(to bottom, rgba(239, 83, 80, 0.3) 0%, var(--color-bajista) 30%, var(--color-bajista) 100%);
            border: 1px solid var(--color-bajista);
            border-radius: 0 0 2px 2px;
        }

        .candle.bearish::before {
            content: '';
            position: absolute;
            width: 1px;
            height: calc(var(--high) - var(--open));
            background-color: var(--color-bajista);
            top: calc(-1 * (var(--high) - var(--open)) * 2px);
            left: 50%;
            transform: translateX(-50%);
        }

        .candle.bearish::after {
            content: '';
            position: absolute;
            width: 1px;
            height: calc(var(--low) * 1px);
            background-color: var(--color-bajista);
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* Leyenda de indicadores técnicos */
        .technical-indicators-legend {
            display: flex;
            gap: 30px;
            padding: 10px 0;
            font-size: 12px;
            flex-wrap: wrap;
        }

        .technical-indicators-legend span {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }

        .technical-indicators-legend span::before {
            content: '';
            display: inline-block;
            width: 20px;
            height: 2px;
            border-radius: 1px;
        }

        .technical-indicators-legend span:nth-child(1)::before {
            background-color: #2196F3;
        }

        .technical-indicators-legend span:nth-child(2)::before {
            background-color: #FF9800;
        }

        .technical-indicators-legend span:nth-child(3)::before {
            background-color: #9C27B0;
        }

        /* Panel lateral derecho con datos de mercado */
        .sidebar-panel {
            background-color: var(--color-fondo-panel);
            border: 1px solid var(--color-borde);
            border-radius: 4px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .market-data-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .market-data-label {
            font-size: 12px;
            color: #999;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .market-data-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--color-titulo);
        }

        .market-data-change {
            font-size: 16px;
            font-weight: 600;
        }

        .market-data-change.positive {
            color: var(--color-alcista);
        }

        .market-data-change.negative {
            color: var(--color-bajista);
        }

        .market-data-secondary {
            font-size: 14px;
            color: #666;
        }

        /* Panel de volumen */
        .volume-panel {
            padding: 20px 30px;
            background-color: var(--color-fondo);
            border-top: 1px solid var(--color-borde);
            grid-column: 1;
        }

        .volume-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--color-titulo);
            margin-bottom: 15px;
        }

        .volume-chart {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            height: 80px;
            gap: 3px;
            background-color: var(--color-fondo-panel);
            border: 1px solid var(--color-borde);
            border-radius: 4px;
            padding: 10px;
        }

        .volume-bar {
            flex: 1;
            background-color: var(--color-alcista);
            border-radius: 2px 2px 0 0;
            min-height: 5px;
            opacity: 0.8;
            transition: opacity 0.2s ease;
        }

        .volume-bar:hover {
            opacity: 1;
        }

        .volume-bar.bearish {
            background-color: var(--color-bajista);
        }

        /* Diseño responsivo para desktop */
        @media (min-width: 1920px) {
            .dashboard-container {
                grid-template-columns: 1fr;
            }

            .main-content {
                grid-template-columns: 1fr 320px;
            }
        }

        /* Diseño responsivo para tablet */
        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .sidebar-panel {
                grid-column: 1;
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }

            .market-data-section {
                gap: 8px;
            }

            .candlestick-chart {
                height: 300px;
            }
        }

        /* Diseño responsivo para móvil */
        @media (max-width: 768px) {
            .dashboard-header {
                padding: 15px 20px;
            }

            .dashboard-header h1 {
                font-size: 22px;
            }

            .tabs-container {
                padding: 0 20px;
            }

            .controls-panel {
                padding: 15px 20px;
                gap: 10px;
            }

            .ticker-selector,
            .period-selector {
                min-width: 100px;
                font-size: 13px;
                padding: 8px 12px;
            }

            .main-content {
                padding: 15px 20px;
                gap: 15px;
            }

            .chart-panel {
                padding: 15px;
            }

            .candlestick-chart {
                height: 250px;
            }

            .sidebar-panel {
                grid-template-columns: 1fr;
                padding: 15px;
            }

            .volume-panel {
                padding: 15px 20px;
            }

            .market-data-value {
                font-size: 20px;
            }

            .market-data-secondary {
                font-size: 12px;
            }
        }

        /* Diseño responsivo para móvil pequeño */
        @media (max-width: 375px) {
            .dashboard-header h1 {
                font-size: 18px;
            }

            .controls-panel {
                flex-direction: column;
            }

            .ticker-selector,
            .period-selector {
                width: 100%;
            }

            .candlestick-chart {
                height: 200px;
            }

            .market-data-value {
                font-size: 18px;
            }

            .volume-chart {
                height: 60px;
            }
        }
    </style>
</head>
<body>
    <!-- ============================================
         MOCKUP ESTÁTICO DE REFERENCIA VISUAL
         Este archivo es una especificación visual de referencia
         para el equipo de desarrollo frontend.
         Representa fielmente la disposición, tipografía, paleta
         de colores y estructura de todos los elementos de la interfaz.
         ============================================ -->

    <div class="dashboard-container">
        <!-- Encabezado del dashboard -->
        <header class="dashboard-header">
            <h1>Dashboard de Visualización de Datos de Mercado</h1>
        </header>

        <!-- Navegación de pestañas -->
        <nav class="tabs-container">
            <div class="tab active">Acciones</div>
            <div class="tab">Criptomonedas</div>
        </nav>

        <!-- Panel de controles (selectores) -->
        <div class="controls-panel">
            <select class="ticker-selector">
                <option value="AAPL">AAPL</option>
                <option value="MSFT">MSFT</option>
                <option value="GOOGL">GOOGL</option>
                <option value="TSLA">TSLA</option>
                <option value="NVDA">NVDA</option>
                <option value="BTC-USD">BTC-USD</option>
                <option value="ETH-USD">ETH-USD</option>
            </select>
            <select class="period-selector">
                <option value="1M">1M</option>
                <option value="3M">3M</option>
                <option value="6M">6M</option>
                <option value="1A">1A</option>
                <option value="2A">2A</option>
                <option value="5A">5A</option>
            </select>
        </div>

        <!-- Contenido principal: gráfico y panel lateral -->
        <main class="main-content">
            <!-- Panel del gráfico de velas japonesas -->
            <div class="chart-panel">
                <!-- Gráfico de velas japonesas con 20 velas representativas -->
                <div class="candlestick-chart">
                    <div class="candle-wrapper">
                        <!-- Vela 1: Alcista -->
                        <div class="candle bullish" style="height: 45%;"></div>
                        <!-- Vela 2: Bajista -->
                        <div class="candle bearish" style="height: 35%;"></div>
                        <!-- Vela 3: Alcista -->
                        <div class="candle bullish" style="height: 42%;"></div>
                        <!-- Vela 4: Alcista -->
                        <div class="candle bullish" style="height: 48%;"></div>
                        <!-- Vela 5: Bajista -->
                        <div class="candle bearish" style="height: 30%;"></div>
                        <!-- Vela 6: Alcista -->
                        <div class="candle bullish" style="height: 40%;"></div>
                        <!-- Vela 7: Bajista -->
                        <div class="candle bearish" style="height: 28%;"></div>
                        <!-- Vela 8: Alcista -->
                        <div class="candle bullish" style="height: 38%;"></div>
                        <!-- Vela 9: Bajista -->
                        <div class="candle bearish" style="height: 25%;"></div>
                        <!-- Vela 10: Alcista -->
                        <div class="candle bullish" style="height: 36%;"></div>
                        <!-- Vela 11: Bajista -->
                        <div class="candle bearish" style="height: 22%;"></div>
                        <!-- Vela 12: Alcista -->
                        <div class="candle bullish" style="height: 34%;"></div>
                        <!-- Vela 13: Bajista -->
                        <div class="candle bearish" style="height: 20%;"></div>
                        <!-- Vela 14: Alcista -->
                        <div class="candle bullish" style="height: 32%;"></div>
                        <!-- Vela 15: Bajista -->
                        <div class="candle bearish" style="height: 18%;"></div>
                        <!-- Vela 16: Alcista -->
                        <div class="candle bullish" style="height: 30%;"></div>
                        <!-- Vela 17: Bajista -->
                        <div class="candle bearish" style="height: 16%;"></div>
                        <!-- Vela 18: Alcista -->
                        <div class="candle bullish" style="height: 28%;"></div>
                        <!-- Vela 19: Bajista -->
                        <div class="candle bearish" style="height: 14%;"></div>
                        <!-- Vela 20: Alcista -->
                        <div class="candle bullish" style="height: 26%;"></div>
                    </div>
                </div>

                <!-- Leyenda de indicadores técnicos -->
                <div class="technical-indicators-legend">
                    <span>SMA 20</span>
                    <span>SMA 50</span>
                    <span>EMA 12</span>
                </div>
            </div>

            <!-- Panel lateral con datos de mercado -->
            <aside class="sidebar-panel">
                <!-- Sección de precio actual -->
                <div class="market-data-section">
                    <div class="market-data-label">Precio Actual</div>
                    <div class="market-data-value">$178.45</div>
                </div>

                <!-- Sección de variación porcentual -->
                <div class="market-data-section">
                    <div class="market-data-label">Variación (24h)</div>
                    <div class="market-data-change positive">+2.34%</div>
                    <div class="market-data-secondary">+$4.12</div>
                </div>

                <!-- Sección de volumen diario -->
                <div class="market-data-section">
                    <div class="market-data-label">Volumen Diario</div>
                    <div class="market-data-value">52.3M</div>
                    <div class="market-data-secondary">Acciones</div>
                </div>

                <!-- Sección de capitalización de mercado -->
                <div class="market-data-section">
                    <div class="market-data-label">Market Cap</div>
                    <div class="market-data-value">$2.8T</div>
                    <div class="market-data-secondary">Capitalización</div>
                </div>
            </aside>
        </main>

        <!-- Panel de volumen inferior -->
        <div class="volume-panel">
            <div class="volume-title">Volumen (últimos 20 períodos)</div>
            <div class="volume-chart">
                <!-- Barras de volumen con colores alternados -->
                <div class="volume-bar" style="height: 45%;"></div>
                <div class="volume-bar bearish" style="height: 52%;"></div>
                <div class="volume-bar" style="height: 48%;"></div>
                <div class="volume-bar" style="height: 55%;"></div>
                <div class="volume-bar bearish" style="height: 60%;"></div>
                <div class="volume-bar" style="height: 50%;"></div>
                <div class="volume-bar bearish" style="height: 58%;"></div>
                <div class="volume-bar" style="height: 46%;"></div>
                <div class="volume-bar bearish" style="height: 62%;"></div>
                <div class="volume-bar" style="height: 44%;"></div>
                <div class="volume-bar bearish" style="height: 65%;"></div>
                <div class="volume-bar" style="height: 42%;"></div>
                <div class="volume-bar bearish" style="height: 68%;"></div>
                <div class="volume-bar" style="height: 40%;"></div>
                <div class="volume-bar bearish" style="height: 70%;"></div>
                <div class="volume-bar" style="height: 38%;"></div>
                <div class="volume-bar bearish" style="height: 72%;"></div>
                <div class="volume-bar" style="height: 36%;"></div>
                <div class="volume-bar bearish" style="height: 75%;"></div>
                <div class="volume-bar" style="height: 34%;"></div>
            </div>
        </div>
    </div>
</body>
</html>
