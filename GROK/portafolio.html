<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InvestAI • Gestión de Portafolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      font-family: 'Inter', system-ui, sans-serif;
    }
    .modal {
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .bar {
      transition: width 0.6s ease;
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <div class="max-w-7xl mx-auto p-8">
    <!-- Header -->
    <div class="flex justify-between items-center mb-10">
      <div class="flex items-center gap-4">
        <div class="w-12 h-12 bg-gradient-to-br from-[#1F3864] to-indigo-700 rounded-2xl flex items-center justify-center text-white text-3xl font-bold">IA</div>
        <div>
          <h1 class="text-4xl font-bold text-[#1F3864]">InvestAI</h1>
          <p class="text-gray-500">Gestión de Portafolio</p>
        </div>
      </div>
      <div class="text-right">
        <p class="text-sm text-gray-500">Valor Total del Portafolio</p>
        <p class="text-3xl font-semibold text-[#1F3864]">$248,650.00</p>
        <p class="text-green-600 font-medium">+4.28% ($10,210)</p>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
      <!-- Tabla de Posiciones -->
      <div class="lg:col-span-7 bg-white rounded-3xl shadow-xl overflow-hidden">
        <div class="px-8 py-6 border-b flex justify-between items-center">
          <h2 class="text-2xl font-semibold text-[#1F3864]">Posiciones Actuales</h2>
          <span class="text-sm text-gray-500">6 activos</span>
        </div>
        
        <div class="overflow-x-auto">
          <table class="w-full">
            <thead>
              <tr class="bg-gray-50 text-left text-sm text-gray-600">
                <th class="px-8 py-5 font-medium">Activo</th>
                <th class="px-6 py-5 font-medium">Cantidad</th>
                <th class="px-6 py-5 font-medium">Costo Promedio</th>
                <th class="px-6 py-5 font-medium">Valor Actual</th>
                <th class="px-6 py-5 font-medium">P&L</th>
              </tr>
            </thead>
            <tbody id="portfolioTable" class="text-gray-700"></tbody>
          </table>
        </div>
      </div>

      <!-- Gráfico de Rendimiento -->
      <div class="lg:col-span-5 bg-white rounded-3xl shadow-xl p-8">
        <h2 class="text-2xl font-semibold text-[#1F3864] mb-6">Rendimiento por Activo</h2>
        <div id="performanceBars" class="space-y-6"></div>
      </div>
    </div>
  </div>

  <!-- Botón Flotante -->
  <button onclick="openModal()" 
    class="fixed bottom-8 right-8 bg-[#C5961A] hover:bg-[#d4a72f] text-[#1F3864] font-semibold px-6 py-4 rounded-2xl shadow-xl flex items-center gap-3 transition-all hover:scale-105">
    <i class="fa-solid fa-plus text-xl"></i>
    <span>Agregar Posición</span>
  </button>

  <!-- Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
    <div class="modal bg-white rounded-3xl w-full max-w-md mx-4 overflow-hidden">
      <div class="px-8 py-6 border-b flex justify-between items-center">
        <h3 class="text-2xl font-semibold text-[#1F3864]">Nueva Posición</h3>
        <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl">×</button>
      </div>
      
      <div class="p-8 space-y-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Activo</label>
          <input type="text" id="asset" class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-[#C5961A]" placeholder="AAPL" required>
        </div>
        
        <div class="grid grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Cantidad</label>
            <input type="number" id="quantity" class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-[#C5961A]" value="10" required>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Costo Promedio</label>
            <input type="number" id="avgCost" class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-[#C5961A]" value="185.50" required>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Precio Actual</label>
          <input type="number" id="currentPrice" class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-[#C5961A]" value="226.84" required>
        </div>
      </div>

      <div class="p-8 border-t flex gap-4">
        <button onclick="closeModal()" 
          class="flex-1 py-4 border border-gray-300 rounded-2xl font-semibold hover:bg-gray-50">Cancelar</button>
        <button onclick="addPosition()" 
          class="flex-1 py-4 bg-[#1F3864] text-white rounded-2xl font-semibold hover:bg-[#16294a]">Guardar Posición</button>
      </div>
    </div>
  </div>

  <script>
    // Datos de ejemplo
    let portfolio = [
      { asset: "AAPL", qty: 45, avgCost: 185.50, current: 226.84, pnl: 1860.30 },
      { asset: "TSLA", qty: 12, avgCost: 320.00, current: 348.92, pnl: 347.04 },
      { asset: "GOOG", qty: 28, avgCost: 165.20, current: 178.65, pnl: 376.60 },
      { asset: "NVDA", qty: 8, avgCost: 118.00, current: 135.20, pnl: 137.60 },
      { asset: "AMZN", qty: 15, avgCost: 178.40, current: 192.50, pnl: 211.50 }
    ];

    // Renderizar tabla
    function renderTable() {
      const tbody = document.getElementById("portfolioTable");
      tbody.innerHTML = '';
      
      portfolio.forEach(item => {
        const pnlClass = item.pnl >= 0 ? 'text-green-600' : 'text-red-600';
        const row = document.createElement('tr');
        row.className = "border-b last:border-none hover:bg-gray-50 transition";
        row.innerHTML = `
          <td class="px-8 py-6 font-semibold text-[#1F3864]">${item.asset}</td>
          <td class="px-6 py-6">${item.qty}</td>
          <td class="px-6 py-6">$${item.avgCost.toFixed(2)}</td>
          <td class="px-6 py-6">$${item.current.toFixed(2)}</td>
          <td class="px-6 py-6 font-semibold ${pnlClass}">$${item.pnl.toFixed(2)}</td>
        `;
        tbody.appendChild(row);
      });
    }

    // Renderizar barras horizontales
    function renderBars() {
      const container = document.getElementById("performanceBars");
      container.innerHTML = '';
      
      portfolio.forEach(item => {
        const percentage = Math.min(Math.abs(item.pnl) / 20, 100);
        const color = item.pnl >= 0 ? '#22c55e' : '#ef4444';
        
        const div = document.createElement('div');
        div.innerHTML = `
          <div class="flex justify-between text-sm mb-2">
            <span class="font-medium">${item.asset}</span>
            <span class="${item.pnl >= 0 ? 'text-green-600' : 'text-red-600'} font-semibold">$${item.pnl.toFixed(2)}</span>
          </div>
          <div class="h-4 bg-gray-100 rounded-full overflow-hidden">
            <div class="bar h-full" style="width: ${percentage}%; background-color: ${color};"></div>
          </div>
        `;
        container.appendChild(div);
      });
    }

    // Modal
    function openModal() {
      document.getElementById("modal").classList.remove("hidden");
    }

    function closeModal() {
      document.getElementById("modal").classList.add("hidden");
    }

    function addPosition() {
      const asset = document.getElementById("asset").value.toUpperCase();
      const qty = parseFloat(document.getElementById("quantity").value);
      const avgCost = parseFloat(document.getElementById("avgCost").value);
      const current = parseFloat(document.getElementById("currentPrice").value);
      
      if (asset && qty && avgCost && current) {
        const pnl = (current - avgCost) * qty;
        portfolio.unshift({ asset, qty, avgCost, current, pnl });
        
        renderTable();
        renderBars();
        closeModal();
        
        // Limpiar formulario
        document.getElementById("asset").value = '';
      }
    }

    // Inicializar
    window.onload = () => {
      renderTable();
      renderBars();
    };
  </script>
</body>
</html>
