<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InvestAI • Dashboard de Predicción</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .card:hover { transform: translateY(-4px); }
    
    /* Fix para el gráfico */
    #chartContainer {
      position: relative;
      height: 420px;
      max-height: 420px;
    }
    #priceChart {
      width: 100% !important;
      height: 100% !important;
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <div class="max-w-7xl mx-auto p-6 lg:p-8">
    <!-- Header -->
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
      <div class="flex items-center gap-4">
        <div class="w-10 h-10 rounded-2xl bg-gradient-to-br from-[#1F3864] to-indigo-700 flex items-center justify-center">
          <span class="text-white text-2xl font-bold">IA</span>
        </div>
        <div>
          <h1 class="text-3xl font-semibold text-[#1F3864]">InvestAI</h1>
          <p class="text-gray-500 text-sm">Predicciones con LSTM</p>
        </div>
      </div>
      <div class="text-right">
        <p class="text-sm text-gray-500">Última actualización</p>
        <p class="font-medium text-[#1F3864]" id="lastUpdate">13 de junio 2026, 10:00</p>
      </div>
    </div>

    <!-- Asset Selector -->
    <div class="flex items-center gap-4 mb-8">
      <h2 class="text-lg font-medium text-gray-700">Activo:</h2>
      <div class="flex bg-white rounded-2xl shadow-sm p-1 border border-gray-100">
        <button onclick="switchAsset(0)" id="btn0" class="asset-btn px-6 py-3 rounded-xl font-semibold text-sm active">AAPL</button>
        <button onclick="switchAsset(1)" id="btn1" class="asset-btn px-6 py-3 rounded-xl font-semibold text-sm">TSLA</button>
        <button onclick="switchAsset(2)" id="btn2" class="asset-btn px-6 py-3 rounded-xl font-semibold text-sm">GOOG</button>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
      <!-- Main Chart -->
      <div class="lg:col-span-8 bg-white rounded-3xl shadow-xl p-6 lg:p-8">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-3">
          <div>
            <h3 class="text-xl font-semibold text-[#1F3864]" id="chartTitle">AAPL - Predicción LSTM</h3>
            <p class="text-gray-500" id="currentPrice">$226.84</p>
          </div>
          <div class="flex items-center gap-6 text-sm">
            <div class="flex items-center gap-2">
              <div class="w-3 h-0.5 bg-blue-600"></div>
              <span class="text-gray-600">Real</span>
            </div>
            <div class="flex items-center gap-2">
              <div class="w-3 h-0.5 bg-[#C5961A]"></div>
              <span class="text-gray-600">Predicción</span>
            </div>
          </div>
        </div>
        
        <!-- Contenedor con altura fija -->
        <div id="chartContainer">
          <canvas id="priceChart"></canvas>
        </div>
      </div>

      <!-- Metrics Cards -->
      <div class="lg:col-span-4 space-y-6">
        <div class="bg-white rounded-3xl shadow-xl p-6 card">
          <div class="flex justify-between items-start">
            <div>
              <p class="text-gray-500 text-sm">Mean Absolute Error (MAE)</p>
              <p class="text-4xl font-semibold text-[#1F3864] mt-2" id="mae">2.84</p>
            </div>
            <div class="w-12 h-12 bg-green-100 text-green-600 rounded-2xl flex items-center justify-center">
              <i class="fa-solid fa-chart-line text-2xl"></i>
            </div>
          </div>
          <p class="text-green-600 text-sm mt-4">Excelente precisión</p>
        </div>

        <div class="bg-white rounded-3xl shadow-xl p-6 card">
          <div class="flex justify-between items-start">
            <div>
              <p class="text-gray-500 text-sm">Root Mean Square Error (RMSE)</p>
              <p class="text-4xl font-semibold text-[#1F3864] mt-2" id="rmse">3.67</p>
            </div>
            <div class="w-12 h-12 bg-green-100 text-green-600 rounded-2xl flex items-center justify-center">
              <i class="fa-solid fa-square-root-variable text-2xl"></i>
            </div>
          </div>
          <p class="text-green-600 text-sm mt-4">Bajo error</p>
        </div>

        <div class="bg-white rounded-3xl shadow-xl p-6 card">
          <div class="flex justify-between items-start">
            <div>
              <p class="text-gray-500 text-sm">Precisión Direccional</p>
              <p class="text-4xl font-semibold text-[#1F3864] mt-2" id="accuracy">87.3%</p>
            </div>
            <div class="w-12 h-12 bg-green-100 text-green-600 rounded-2xl flex items-center justify-center">
              <i class="fa-solid fa-compass text-2xl"></i>
            </div>
          </div>
          <p class="text-green-600 text-sm mt-4">Muy buena tendencia</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const assetsData = [
      { name: "AAPL", currentPrice: 226.84, mae: 2.84, rmse: 3.67, accuracy: 87.3,
        real: [218,221,224,223,226,228,227,229,231,230,232,234,233,235,237],
        predicted: [219.5,222.1,223.8,224.9,226.2,227.8,228.4,229.7,230.9,231.5,232.8,233.6,234.7,235.9,237.4] },
      { name: "TSLA", currentPrice: 348.92, mae: 8.45, rmse: 11.23, accuracy: 79.8,
        real: [320,325,338,345,342,350,355,348,360,358,365,370,368,372,375],
        predicted: [322,328,340,347,344,352,356,351,362,359,367,371,370,374,378] },
      { name: "GOOG", currentPrice: 178.65, mae: 1.95, rmse: 2.48, accuracy: 91.2,
        real: [172,174,175,177,179,180,178,181,183,182,185,187,186,188,190],
        predicted: [173.2,174.8,176.1,177.9,178.8,180.4,179.2,181.7,183.5,182.8,185.3,187.1,186.4,188.6,190.5] }
    ];

    let currentAsset = 0;
    let priceChart = null;

    function createChart(data) {
      const ctx = document.getElementById('priceChart');
      if (priceChart) priceChart.destroy();

      const labels = Array.from({length: data.real.length}, (_, i) => `D${i+1}`);

      priceChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [
            {
              label: 'Precio Real',
              data: data.real,
              borderColor: '#2563eb',
              backgroundColor: 'rgba(37, 99, 235, 0.08)',
              borderWidth: 3,
              tension: 0.4,
              fill: true
            },
            {
              label: 'Predicción LSTM',
              data: data.predicted,
              borderColor: '#C5961A',
              backgroundColor: 'rgba(197, 150, 26, 0.12)',
              borderWidth: 3,
              tension: 0.4,
              fill: true
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: { mode: 'index', intersect: false }
          },
          scales: {
            y: { grid: { color: '#e5e7eb' }, ticks: { color: '#6b7280' } },
            x: { grid: { color: '#f3f4f6' }, ticks: { color: '#6b7280' } }
          }
        }
      });
    }

    function updateMetrics(data) {
      document.getElementById('mae').textContent = data.mae;
      document.getElementById('rmse').textContent = data.rmse;
      document.getElementById('accuracy').textContent = data.accuracy + "%";
      document.getElementById('currentPrice').textContent = "$" + data.currentPrice.toFixed(2);
      document.getElementById('chartTitle').textContent = `${data.name} - Predicción LSTM (Próximos 30 días)`;
    }

    function switchAsset(index) {
      currentAsset = index;
      const data = assetsData[index];

      document.querySelectorAll('.asset-btn').forEach((btn, i) => {
        btn.classList.toggle('bg-[#1F3864]', i === index);
        btn.classList.toggle('text-white', i === index);
      });

      updateMetrics(data);
      createChart(data);
    }

    // Inicializar
    window.onload = () => {
      switchAsset(0);
    };
  </script>
</body>
</html>
